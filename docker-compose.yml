version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pocket-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pocket
      POSTGRES_USER: pocket
      POSTGRES_PASSWORD: pocket
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://pocket:pocket@db:5432/pocket?schema=public
      API_PORT: 4000
      WEB_URL: http://localhost:3000
      API_URL: http://localhost:4000
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres-data:

