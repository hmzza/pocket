services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pocket}
      POSTGRES_USER: ${POSTGRES_USER:-pocket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pocket}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pocket} -d ${POSTGRES_DB:-pocket}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: ${POCKET_API_IMAGE}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pocket}:${POSTGRES_PASSWORD:-pocket}@db:5432/${POSTGRES_DB:-pocket}?schema=public
      API_PORT: 4000
      WEB_URL: http://localhost:${WEB_PORT:-3000}
      API_URL: http://localhost:${API_PORT:-4000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@pocketshawarma.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-PocketAdmin123!}
      SEED_DATABASE: ${SEED_DATABASE:-true}
      SEED_VERSION: ${SEED_VERSION:-1}
      FORCE_SEED: ${FORCE_SEED:-false}
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    image: ${POCKET_WEB_IMAGE}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres-data:
